name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build universal binary
        run: |
          swiftc \
            Sources/CCStatus/main.swift \
            Sources/CCStatus/AppDelegate.swift \
            Sources/CCStatus/SessionMonitor.swift \
            Sources/CCStatus/StatusLightView.swift \
            Sources/CCStatus/StatusLightWindow.swift \
            Sources/CCStatus/MenuBarIcon.swift \
            Sources/CCStatus/PermissionGuidePanel.swift \
            -o cc-status-arm64 \
            -framework AppKit \
            -framework Foundation \
            -framework ServiceManagement \
            -swift-version 5 \
            -target arm64-apple-macosx13.0

          swiftc \
            Sources/CCStatus/main.swift \
            Sources/CCStatus/AppDelegate.swift \
            Sources/CCStatus/SessionMonitor.swift \
            Sources/CCStatus/StatusLightView.swift \
            Sources/CCStatus/StatusLightWindow.swift \
            Sources/CCStatus/MenuBarIcon.swift \
            Sources/CCStatus/PermissionGuidePanel.swift \
            -o cc-status-x86_64 \
            -framework AppKit \
            -framework Foundation \
            -framework ServiceManagement \
            -swift-version 5 \
            -target x86_64-apple-macosx13.0

          lipo -create cc-status-arm64 cc-status-x86_64 -output cc-status
          lipo -info cc-status

      - name: Package app bundle
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          APP_NAME="CCStatus"
          APP_PATH="${APP_NAME}.app"

          mkdir -p "${APP_PATH}/Contents/MacOS"
          mkdir -p "${APP_PATH}/Contents/Resources"

          cp cc-status "${APP_PATH}/Contents/MacOS/"
          chmod +x "${APP_PATH}/Contents/MacOS/cc-status"

          sed "s/<string>2.0.0<\/string>/<string>${VERSION}<\/string>/g" \
            Sources/CCStatus/Info.plist > "${APP_PATH}/Contents/Info.plist"

      - name: Sign app bundle
        run: |
          APP_PATH="CCStatus.app"

          codesign --force --deep \
            --sign - \
            "${APP_PATH}"

          codesign --verify --verbose "${APP_PATH}"
          echo "✅ Code signing OK"

      - name: Create DMG
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          APP_NAME="CCStatus"
          DMG_NAME="CC-Status-${VERSION}.dmg"

          TMP_DIR="/tmp/${APP_NAME}_dmg"
          rm -rf "$TMP_DIR"
          mkdir -p "$TMP_DIR"
          cp -R "${APP_NAME}.app" "$TMP_DIR/"

          # 清除 app bundle 内所有文件的 quarantine xattr。
          # DMG 本身下载后会被 Safari/浏览器加上 quarantine，但 DMG 内的 app
          # 不应该有 quarantine——有了就会导致 AppleScript TCC 权限被静默拒绝，
          # 系统不弹授权窗口，点状态灯无法拉起终端。
          find "$TMP_DIR/${APP_NAME}.app" -exec xattr -c {} \; 2>/dev/null || true

          ln -s /Applications "$TMP_DIR/Applications"

          hdiutil create \
            -volname "CC Status" \
            -srcfolder "$TMP_DIR" \
            -ov -format UDZO \
            "${DMG_NAME}"

          rm -rf "$TMP_DIR"
          echo "DMG_NAME=${DMG_NAME}" >> "$GITHUB_ENV"

      - name: Verify DMG contents
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          DMG_NAME="CC-Status-${VERSION}.dmg"
          hdiutil attach "${DMG_NAME}" -mountpoint /tmp/verify_dmg
          codesign --verify --verbose "/tmp/verify_dmg/CCStatus.app"
          # 确认没有 quarantine xattr
          xattr "/tmp/verify_dmg/CCStatus.app" || true
          echo "✅ DMG verification OK"
          hdiutil detach /tmp/verify_dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CC Status ${{ steps.version.outputs.VERSION }}
          body: |
            ## 安装说明

            1. 下载 DMG，打开后将 **CCStatus.app** 拖入 Applications
            2. **首次启动**：右键点击 CCStatus.app → **打开** → 在弹窗中点击「打开」
            3. **首次点击状态灯**：系统会弹出「CC Status 想要控制 iTerm2」授权窗口，点击**好**
          files: ${{ env.DMG_NAME }}
          generate_release_notes: true
