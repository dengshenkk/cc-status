name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build universal binary
        run: |
          # Build for arm64
          swiftc \
            Sources/CCStatus/main.swift \
            Sources/CCStatus/AppDelegate.swift \
            Sources/CCStatus/SessionMonitor.swift \
            Sources/CCStatus/StatusLightView.swift \
            Sources/CCStatus/StatusLightWindow.swift \
            Sources/CCStatus/MenuBarIcon.swift \
            -o cc-status-arm64 \
            -framework AppKit \
            -framework Foundation \
            -framework ServiceManagement \
            -swift-version 5 \
            -target arm64-apple-macosx13.0

          # Build for x86_64
          swiftc \
            Sources/CCStatus/main.swift \
            Sources/CCStatus/AppDelegate.swift \
            Sources/CCStatus/SessionMonitor.swift \
            Sources/CCStatus/StatusLightView.swift \
            Sources/CCStatus/StatusLightWindow.swift \
            Sources/CCStatus/MenuBarIcon.swift \
            -o cc-status-x86_64 \
            -framework AppKit \
            -framework Foundation \
            -framework ServiceManagement \
            -swift-version 5 \
            -target x86_64-apple-macosx13.0

          # Create universal binary
          lipo -create cc-status-arm64 cc-status-x86_64 -output cc-status
          lipo -info cc-status

      - name: Package app bundle
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          APP_NAME="CCStatus"
          APP_PATH="${APP_NAME}.app"

          mkdir -p "${APP_PATH}/Contents/MacOS"
          mkdir -p "${APP_PATH}/Contents/Resources"

          # 可执行文件
          cp cc-status "${APP_PATH}/Contents/MacOS/"
          chmod +x "${APP_PATH}/Contents/MacOS/cc-status"

          # 使用仓库里的 Info.plist，替换版本号
          sed "s/<string>2.0.0<\/string>/<string>${VERSION}<\/string>/g" \
            Sources/CCStatus/Info.plist > "${APP_PATH}/Contents/Info.plist"

      - name: Sign app bundle
        run: |
          APP_PATH="CCStatus.app"

          # Ad-hoc 签名（不带 --options runtime，避免 Hardened Runtime
          # 在 Gatekeeper 隔离下阻断 AppleScript / lsof / ps 子进程调用）
          codesign --force --deep \
            --sign - \
            --entitlements entitlements.plist \
            "${APP_PATH}"

          # 验证签名
          codesign --verify --verbose "${APP_PATH}"
          echo "✅ Code signing OK"

      - name: Create DMG
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          APP_NAME="CCStatus"
          DMG_NAME="CC-Status-${VERSION}.dmg"

          TMP_DIR="/tmp/${APP_NAME}_dmg"
          rm -rf "$TMP_DIR"
          mkdir -p "$TMP_DIR"
          cp -R "${APP_NAME}.app" "$TMP_DIR/"
          ln -s /Applications "$TMP_DIR/Applications"

          hdiutil create \
            -volname "CC Status" \
            -srcfolder "$TMP_DIR" \
            -ov -format UDZO \
            "${DMG_NAME}"

          rm -rf "$TMP_DIR"
          echo "DMG_NAME=${DMG_NAME}" >> "$GITHUB_ENV"

      - name: Verify DMG contents
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          DMG_NAME="CC-Status-${VERSION}.dmg"
          hdiutil attach "${DMG_NAME}" -mountpoint /tmp/verify_dmg
          codesign --verify --verbose "/tmp/verify_dmg/CCStatus.app"
          echo "✅ DMG verification OK"
          hdiutil detach /tmp/verify_dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CC Status ${{ steps.version.outputs.VERSION }}
          body: |
            ## 安装说明

            1. 下载 DMG，打开后将 CCStatus.app 拖入 Applications
            2. **首次启动**：右键点击 CCStatus.app → 选择"打开" → 在弹出对话框中点击"打开"
               （必须这样做，否则 macOS Gatekeeper 会阻止未经公证的 app 运行）
            3. 首次点击灯时，系统会弹出权限请求：
               - **自动化权限**：允许 CC Status 控制终端（iTerm2/Terminal.app）
               - 在"系统设置 → 隐私与安全 → 自动化"中确认已勾选
          files: ${{ env.DMG_NAME }}
          generate_release_notes: true
