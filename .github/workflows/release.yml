name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build universal binary
        run: |
          # Build for arm64
          swiftc \
            Sources/CCStatus/main.swift \
            Sources/CCStatus/AppDelegate.swift \
            Sources/CCStatus/SessionMonitor.swift \
            Sources/CCStatus/StatusLightView.swift \
            Sources/CCStatus/StatusLightWindow.swift \
            Sources/CCStatus/MenuBarIcon.swift \
            -o cc-status-arm64 \
            -framework AppKit \
            -framework Foundation \
            -framework ServiceManagement \
            -swift-version 5 \
            -target arm64-apple-macosx13.0

          # Build for x86_64
          swiftc \
            Sources/CCStatus/main.swift \
            Sources/CCStatus/AppDelegate.swift \
            Sources/CCStatus/SessionMonitor.swift \
            Sources/CCStatus/StatusLightView.swift \
            Sources/CCStatus/StatusLightWindow.swift \
            Sources/CCStatus/MenuBarIcon.swift \
            -o cc-status-x86_64 \
            -framework AppKit \
            -framework Foundation \
            -framework ServiceManagement \
            -swift-version 5 \
            -target x86_64-apple-macosx13.0

          # Create universal binary
          lipo -create cc-status-arm64 cc-status-x86_64 -output cc-status
          lipo -info cc-status

      - name: Package app bundle
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          APP_NAME="CCStatus"
          APP_PATH="${APP_NAME}.app"

          mkdir -p "${APP_PATH}/Contents/MacOS"
          mkdir -p "${APP_PATH}/Contents/Resources"

          cp cc-status "${APP_PATH}/Contents/MacOS/"
          chmod +x "${APP_PATH}/Contents/MacOS/cc-status"

          sed "s/<string>2.0.0<\/string>/<string>${VERSION}<\/string>/g" \
            Sources/CCStatus/Info.plist > "${APP_PATH}/Contents/Info.plist"

      - name: Sign app bundle
        run: |
          APP_PATH="CCStatus.app"

          # ad-hoc 签名，不加 --options runtime。
          # 不用 Hardened Runtime 的原因：ad-hoc 无法公证，Hardened Runtime
          # 下系统会静默拒绝 AppleScript 权限请求（不弹窗），导致点灯无响应。
          # 不加 --options runtime 时走普通 TCC 流程，第一次执行 AppleScript
          # 时系统会正常弹出"CC Status 想要控制 iTerm2"授权窗口。
          codesign --force --deep \
            --sign - \
            "${APP_PATH}"

          codesign --verify --verbose "${APP_PATH}"
          echo "✅ Code signing OK"

      - name: Create DMG
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          APP_NAME="CCStatus"
          DMG_NAME="CC-Status-${VERSION}.dmg"

          TMP_DIR="/tmp/${APP_NAME}_dmg"
          rm -rf "$TMP_DIR"
          mkdir -p "$TMP_DIR"
          cp -R "${APP_NAME}.app" "$TMP_DIR/"
          ln -s /Applications "$TMP_DIR/Applications"

          hdiutil create \
            -volname "CC Status" \
            -srcfolder "$TMP_DIR" \
            -ov -format UDZO \
            "${DMG_NAME}"

          rm -rf "$TMP_DIR"
          echo "DMG_NAME=${DMG_NAME}" >> "$GITHUB_ENV"

      - name: Verify DMG contents
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          DMG_NAME="CC-Status-${VERSION}.dmg"
          hdiutil attach "${DMG_NAME}" -mountpoint /tmp/verify_dmg
          codesign --verify --verbose "/tmp/verify_dmg/CCStatus.app"
          echo "✅ DMG verification OK"
          hdiutil detach /tmp/verify_dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CC Status ${{ steps.version.outputs.VERSION }}
          body: |
            ## 安装说明

            1. 下载 DMG，打开后将 **CCStatus.app** 拖入 Applications
            2. **首次启动**：右键点击 CCStatus.app → **打开** → 在弹窗中点击"打开"
               （必须这样，否则 Gatekeeper 会阻止未公证的 app）
            3. **首次点击状态灯**：系统会弹出「CC Status 想要控制 iTerm2/Terminal」权限请求，点击**好**
               - 若误点了「不允许」，在 **系统设置 → 隐私与安全 → 自动化** 中手动勾选
          files: ${{ env.DMG_NAME }}
          generate_release_notes: true
